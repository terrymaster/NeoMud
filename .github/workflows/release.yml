name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for git describe

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Update version from tag
        run: ./gradlew updateVersion

      - name: Build world bundle
        run: ./gradlew packageWorld --rerun-tasks

      - name: Build fat JAR
        run: ./gradlew :server:shadowJar

      - name: Run tests
        run: ./gradlew :shared:jvmTest :server:test

      - name: Prepare release assets
        run: |
          cp server/build/libs/neomud-server.jar neomud-server-${{ github.ref_name }}.jar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: neomud-server-${{ github.ref_name }}.jar

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push game server image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/neomud-server:latest
            ghcr.io/${{ github.repository_owner }}/neomud-server:${{ github.ref_name }}

      - name: Pull new image on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: docker pull ghcr.io/${{ github.repository_owner }}/neomud-server:latest
