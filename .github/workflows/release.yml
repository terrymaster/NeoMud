name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for git describe

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Update version from tag
        run: ./gradlew updateVersion

      - name: Build world bundle
        run: ./gradlew packageWorld --rerun-tasks

      - name: Build fat JAR
        run: ./gradlew :server:shadowJar

      - name: Run tests
        run: ./gradlew :shared:jvmTest :server:test

      - name: Build WASM client
        run: ./gradlew :client:wasmJsBrowserDistribution

      - name: Prepare release assets
        run: |
          cp server/build/libs/neomud-server.jar neomud-server-${{ github.ref_name }}.jar
          cp server/build/worlds/default-world.nmd default-world-${{ github.ref_name }}.nmd
          cd client/build/dist/wasmJs/productionExecutable && tar czf ../../../../../neomud-wasm-${{ github.ref_name }}.tar.gz . && cd -

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            neomud-server-${{ github.ref_name }}.jar
            default-world-${{ github.ref_name }}.nmd
            neomud-wasm-${{ github.ref_name }}.tar.gz

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push game server image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/neomud-server:latest
            ghcr.io/${{ github.repository_owner }}/neomud-server:${{ github.ref_name }}

      - name: Build and push maker image
        uses: docker/build-push-action@v6
        with:
          context: ./maker
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/neomud-maker:latest
            ghcr.io/${{ github.repository_owner }}/neomud-maker:${{ github.ref_name }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull ghcr.io/${{ github.repository_owner }}/neomud-server:latest
            docker pull ghcr.io/${{ github.repository_owner }}/neomud-maker:latest
            # Prepare asset directories
            mkdir -p /srv/neomud-assets /srv/neomud-wasm-stage

      - name: Upload world bundle and WASM client to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "server/build/worlds/default-world.nmd"
          target: /srv/neomud-assets/
          strip_components: 3

      - name: Upload WASM client to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "client/build/dist/wasmJs/productionExecutable/*"
          target: /srv/neomud-wasm-stage/
          strip_components: 5
