name: Deploy Game Server to Staging

on:
  push:
    branches: [master]
    paths:
      - 'server/**'
      - 'shared/**'
      - 'Dockerfile'

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: "[1/9] Run tests"
        run: |
          echo "[1/9] Running tests..."
          ./gradlew packageWorld --rerun-tasks
          ./gradlew :shared:jvmTest :server:test --no-daemon
          echo "[1/9] ✓ All tests passed"

  deploy-server:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: "[2/9] Clean and build"
        run: |
          echo "[2/9] Clean building..."
          ./gradlew clean
          ./gradlew packageWorld --rerun-tasks
          ./gradlew :server:shadowJar --no-daemon
          echo "[2/9] ✓ Build complete"

      - name: "[3/9] Verify build artifacts"
        run: |
          echo "[3/9] Verifying artifacts..."
          ls -lh server/build/libs/neomud-server.jar || { echo "[3/9] ✗ FATAL: shadowJar not found"; exit 1; }
          ls -lh server/build/worlds/default-world.nmd || { echo "[3/9] ✗ FATAL: world bundle not found"; exit 1; }
          echo "[3/9] ✓ Artifacts verified"

      - name: "[4/9] Log in to GHCR"
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "[5/9] Build and push Docker image"
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/neomud-server:latest
            ghcr.io/${{ github.repository_owner }}/neomud-server:sha-${{ github.sha }}

      - name: "[6/9] Deploy to staging"
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY_STAGING }}
          script: |
            echo "[6/9] Pulling new image and restarting..."
            docker pull ghcr.io/${{ github.repository_owner }}/neomud-server:latest
            docker ps --filter "label=neomud.worldId" -q | xargs -r docker stop
            docker ps -a --filter "label=neomud.worldId" -q | xargs -r docker rm
            docker image prune -f
            cd ~/neomud-staging
            docker compose restart platform-stg
            echo "[6/9] ✓ Platform restarted — game server will auto-start"

      - name: "[7/9] Clean old world bundle"
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY_STAGING }}
          script: |
            echo "[7/9] Cleaning old bundle..."
            rm -f /srv/neomud-assets/default-world.nmd
            echo "[7/9] ✓ Cleaned"

      - name: "[8/9] Upload world bundle"
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY_STAGING }}
          source: "server/build/worlds/default-world.nmd"
          target: /srv/neomud-assets/
          strip_components: 3
          overwrite: true

      - name: "[9/9] Verify staging health"
        run: |
          echo "[9/9] Waiting for staging to come up..."
          sleep 30
          curl -sf https://stage-api.neomud.app/api/v1/health || { echo "[9/9] ✗ API health check failed"; exit 1; }
          echo "[9/9] ✓ API healthy"
          curl -sf https://stage.neomud.app/health && echo " [9/9] ✓ Game server healthy" || echo "[9/9] ⚠ Game server may still be starting"
