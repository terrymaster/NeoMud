name: Deploy Maker to Staging

on:
  push:
    branches: [master]
    paths:
      - 'maker/**'

permissions:
  contents: read
  packages: write

jobs:
  deploy-maker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: "[1/5] Log in to GHCR"
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "[2/5] Build and push maker image"
        uses: docker/build-push-action@v6
        with:
          context: ./maker
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/neomud-maker:latest
            ghcr.io/${{ github.repository_owner }}/neomud-maker:sha-${{ github.sha }}

      - name: "[3/5] Deploy to staging"
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY_STAGING }}
          script: |
            echo "[3/5] Pulling and recreating maker..."
            docker pull ghcr.io/${{ github.repository_owner }}/neomud-maker:latest
            cd ~/neomud-staging
            docker compose up -d --force-recreate --no-deps maker-stg
            echo "[3/5] ✓ Maker container recreated"

      - name: "[4/5] Verify maker health"
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY_STAGING }}
          script: |
            echo "[4/5] Waiting for maker to start..."
            sleep 10
            docker ps --filter name=maker-stg --format '{{.Status}}' | grep -q healthy && echo "[4/5] ✓ Maker container healthy" || echo "[4/5] ⚠ Maker still starting"

      - name: "[5/5] Verify staging URL"
        run: |
          sleep 5
          curl -sf https://stage-maker.neomud.app/ -o /dev/null && echo "[5/5] ✓ Maker accessible at https://stage-maker.neomud.app/" || { echo "[5/5] ✗ Maker not accessible"; exit 1; }
