name: Deploy Maker to Staging

on:
  push:
    branches: [master]
    paths:
      - 'maker/**'

permissions:
  contents: read
  packages: write

jobs:
  deploy-maker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push maker image
        uses: docker/build-push-action@v6
        with:
          context: ./maker
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/neomud-maker:latest
            ghcr.io/${{ github.repository_owner }}/neomud-maker:sha-${{ github.sha }}

      - name: Deploy to staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull ghcr.io/${{ github.repository_owner }}/neomud-maker:latest
            cd ~/neomud-staging
            docker compose up -d --force-recreate --no-deps maker-stg
            echo "Maker staging deployed"
