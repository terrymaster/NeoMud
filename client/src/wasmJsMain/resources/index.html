<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NeoMud</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #080604; }
        canvas { display: block; width: 100%; height: 100%; }
        #loading {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #080604; color: #c4a46c;
            font-family: 'Georgia', serif; z-index: 1000;
        }
        #loading h1 { font-size: 2.5rem; margin-bottom: 1rem; letter-spacing: 0.1em; }
        #loading .spinner {
            width: 48px; height: 48px;
            border: 4px solid #2a2018; border-top-color: #c4a46c;
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        #loading p { margin-top: 1rem; font-size: 0.9rem; opacity: 0.7; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading">
        <h1>NeoMud</h1>
        <div class="spinner"></div>
        <p>Loading game client...</p>
    </div>
    <div id="ComposeTarget" style="width: 100%; height: 100%;"></div>
    <script>
        // Remove loading screen once Compose renders
        const observer = new MutationObserver(() => {
            const canvas = document.getElementById('ComposeTarget');
            if (canvas && canvas.width > 0) {
                document.getElementById('loading')?.remove();
                observer.disconnect();
            }
        });
        observer.observe(document.body, { childList: true, subtree: true, attributes: true });
        setTimeout(() => document.getElementById('loading')?.remove(), 15000);
    </script>
    <script src="neomud-audio.js"></script>
    <script src="neomud.js"></script>
</body>
</html>
