<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NeoMud</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #080604; }
        canvas { display: block; width: 100%; height: 100%; }
        #loading {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #080604; color: #c4a46c;
            font-family: 'Cinzel', 'Georgia', serif; z-index: 1000;
            overflow: hidden;
        }
        /* Cover image background */
        #loading .cover-bg {
            position: absolute; inset: 0;
            background-size: cover; background-position: center;
            opacity: 0.25; filter: blur(2px);
        }
        /* Dark overlay */
        #loading .cover-overlay {
            position: absolute; inset: 0;
            background: radial-gradient(ellipse at center, #08060480 0%, #080604e0 70%);
        }
        #loading .content { position: relative; z-index: 1; text-align: center; }
        #loading h1 {
            font-size: 2.2rem; margin-bottom: 0.2rem;
            letter-spacing: 0.15em; font-weight: 700;
            text-shadow: 0 2px 16px #cca85530;
        }
        #loading .world-meta {
            font-size: 0.8rem; color: #5a5040;
            font-family: 'Georgia', serif;
            margin-bottom: 1.2rem;
        }
        #loading .world-meta .version {
            font-family: 'Cinzel', serif;
            font-size: 0.7rem; color: #bba060;
            letter-spacing: 1px;
        }
        #loading .world-meta .creator {
            font-style: italic;
        }
        /* Stone trough progress bar */
        #loading .progress-trough {
            width: 220px; height: 10px;
            background: #2a2218;
            border: 1px solid #3d3428;
            border-radius: 5px;
            overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
        }
        #loading .progress-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #cca855, #bba060);
            border-radius: 4px;
            transition: width 1.5s ease;
        }
        #loading .stage-text {
            margin-top: 0.75rem; font-size: 0.85rem; opacity: 0.6;
            font-family: 'Georgia', serif;
        }
        /* Decorative divider */
        #loading .divider {
            width: 80px; height: 1px; margin: 0.4rem auto 0.8rem;
            background: linear-gradient(90deg, transparent, #cca85580, transparent);
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="cover-bg" id="cover-bg"></div>
        <div class="cover-overlay"></div>
        <div class="content">
            <h1 id="world-title">NeoMud</h1>
            <div class="divider"></div>
            <div class="world-meta" id="world-meta"></div>
            <div class="progress-trough">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <p class="stage-text" id="stage-text">Loading game engine...</p>
        </div>
    </div>
    <div id="ComposeTarget" style="width: 100%; height: 100%;"></div>
    <script>
        // Read marketplace config from sessionStorage FIRST (before anything else)
        try {
            var stored = sessionStorage.getItem('__NEOMUD_CONFIG__');
            if (stored) {
                window.__NEOMUD_CONFIG__ = JSON.parse(stored);
                sessionStorage.removeItem('__NEOMUD_CONFIG__');
            }
        } catch(e) { /* ignore parse errors */ }

        // Apply world metadata to loading screen
        var cfg = window.__NEOMUD_CONFIG__;
        if (cfg) {
            if (cfg.worldName) {
                document.getElementById('world-title').textContent = cfg.worldName;
                document.title = cfg.worldName + ' — NeoMud';
            }
            var metaHtml = '';
            if (cfg.worldVersion) metaHtml += '<span class="version">v' + cfg.worldVersion + '</span>';
            if (cfg.worldVersion && cfg.creatorName) metaHtml += ' <span style="color:#3d3428">&bull;</span> ';
            if (cfg.creatorName) metaHtml += '<span class="creator">by ' + cfg.creatorName + '</span>';
            if (metaHtml) document.getElementById('world-meta').innerHTML = metaHtml;
            if (cfg.coverImageUrl) {
                document.getElementById('cover-bg').style.backgroundImage = 'url(' + cfg.coverImageUrl + ')';
            }
            // Play loading BGM
            if (cfg.loadingBgmUrl) {
                var bgm = new Audio(cfg.loadingBgmUrl);
                bgm.loop = true;
                bgm.volume = 0.4;
                bgm.play().catch(function(){});
                window.__NEOMUD_LOADING_BGM__ = bgm;
            }
        }

        // Staged loading progress
        var fill = document.getElementById('progress-fill');
        var stageText = document.getElementById('stage-text');
        var stages = [
            { pct: 25, text: 'Loading game engine...' },
            { pct: 50, text: 'Compiling shaders...' },
            { pct: 75, text: 'Initializing world...' },
            { pct: 90, text: 'Almost ready...' }
        ];
        var stageIdx = 0;

        function advanceStage() {
            if (stageIdx < stages.length) {
                fill.style.width = stages[stageIdx].pct + '%';
                stageText.textContent = stages[stageIdx].text;
                stageIdx++;
            }
        }

        advanceStage();
        setTimeout(advanceStage, 2000);
        setTimeout(advanceStage, 5000);
        setTimeout(advanceStage, 9000);

        // Remove loading screen once Compose renders
        var observer = new MutationObserver(function() {
            var target = document.getElementById('ComposeTarget');
            if (target && target.childNodes.length > 0) {
                fill.style.width = '100%';
                stageText.textContent = 'Connected!';
                // Stop loading BGM (game will start its own)
                if (window.__NEOMUD_LOADING_BGM__) {
                    window.__NEOMUD_LOADING_BGM__.pause();
                    window.__NEOMUD_LOADING_BGM__ = null;
                }
                setTimeout(function() {
                    document.getElementById('loading')?.remove();
                    observer.disconnect();
                }, 400);
            }
        });
        observer.observe(document.body, { childList: true, subtree: true, attributes: true });
        setTimeout(function() { document.getElementById('loading')?.remove(); }, 20000);
    </script>
    <script src="neomud-audio.js"></script>
    <script src="neomud.js"></script>
</body>
</html>
