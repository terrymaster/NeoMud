<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NeoMud</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:ital@0;1&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #080604; }
        canvas { display: block; width: 100%; height: 100%; }

        /* ─── Loading Screen ─── */
        #loading {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: #080604; z-index: 1000;
            overflow: hidden;
        }

        /* Cover image — atmospheric backdrop */
        #loading .cover-bg {
            position: absolute; inset: -20px; /* slight overflow for blur edge */
            background-size: cover; background-position: center;
            opacity: 0;
            filter: blur(4px) saturate(0.7);
            animation: coverReveal 2s ease-out 0.3s forwards;
        }
        @keyframes coverReveal {
            to { opacity: 0.3; }
        }

        /* Multi-layer vignette — deep focus on center */
        #loading .vignette {
            position: absolute; inset: 0;
            background:
                radial-gradient(ellipse 80% 70% at 50% 45%, transparent 30%, #080604cc 70%, #080604 100%),
                linear-gradient(180deg, #080604a0 0%, transparent 30%, transparent 70%, #080604d0 100%);
        }

        /* Floating ember particles (CSS-only) */
        #loading .embers {
            position: absolute; inset: 0; pointer-events: none;
            overflow: hidden;
        }
        #loading .ember {
            position: absolute;
            width: 2px; height: 2px;
            background: #cca855;
            border-radius: 50%;
            opacity: 0;
            animation: float 6s ease-in infinite;
        }
        #loading .ember:nth-child(1) { left: 20%; bottom: 30%; animation-delay: 0s; animation-duration: 5s; }
        #loading .ember:nth-child(2) { left: 45%; bottom: 20%; animation-delay: 1.2s; animation-duration: 7s; }
        #loading .ember:nth-child(3) { left: 70%; bottom: 35%; animation-delay: 2.5s; animation-duration: 6s; }
        #loading .ember:nth-child(4) { left: 35%; bottom: 25%; animation-delay: 3.8s; animation-duration: 5.5s; width: 3px; height: 3px; }
        #loading .ember:nth-child(5) { left: 60%; bottom: 40%; animation-delay: 0.8s; animation-duration: 8s; }
        #loading .ember:nth-child(6) { left: 15%; bottom: 45%; animation-delay: 4.5s; animation-duration: 6.5s; }
        @keyframes float {
            0%   { transform: translateY(0) scale(1); opacity: 0; }
            10%  { opacity: 0.8; }
            80%  { opacity: 0.3; }
            100% { transform: translateY(-40vh) scale(0.3); opacity: 0; }
        }

        /* Content card */
        #loading .content {
            position: relative; z-index: 2;
            text-align: center;
            width: 88%; max-width: 520px;
            padding: 2rem 1.5rem;
        }

        /* World title */
        #loading h1 {
            font-family: 'Cinzel', 'Georgia', serif;
            font-size: clamp(1.4rem, 5vw, 2.4rem);
            font-weight: 700;
            color: #CCA855;
            letter-spacing: 0.12em;
            line-height: 1.2;
            text-shadow: 0 0 30px #cca85520, 0 2px 8px #00000080;
            opacity: 0;
            animation: fadeUp 0.8s ease-out 0.2s forwards;
        }

        /* Ornamental divider */
        #loading .divider {
            width: 60%; max-width: 160px; height: 1px;
            margin: 0.6rem auto 0.5rem;
            position: relative;
            background: linear-gradient(90deg, transparent, #CCA85540, transparent);
            opacity: 0;
            animation: fadeUp 0.6s ease-out 0.5s forwards;
        }
        #loading .divider::after {
            content: '◆';
            position: absolute; left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            font-size: 6px; color: #CCA85540;
        }

        /* Version + Creator */
        #loading .world-meta {
            font-family: 'Crimson Text', 'Georgia', serif;
            font-size: clamp(0.7rem, 2vw, 0.85rem);
            color: #5A5040;
            margin-bottom: 1.5rem;
            opacity: 0;
            animation: fadeUp 0.6s ease-out 0.7s forwards;
        }
        #loading .world-meta .version {
            font-family: 'Cinzel', serif;
            font-size: 0.65rem;
            color: #BBA060;
            letter-spacing: 1.5px;
        }
        #loading .world-meta .creator {
            font-style: italic;
        }
        #loading .world-meta .dot {
            color: #3D3428;
            margin: 0 0.5em;
        }

        /* Stone trough progress bar */
        #loading .progress-trough {
            width: 100%; height: 8px;
            background: #1A1510;
            border: 1px solid #3D3428;
            border-radius: 4px;
            overflow: hidden;
            box-shadow:
                inset 0 1px 3px #0D0A0880,
                0 1px 0 #3D342830;
            opacity: 0;
            animation: fadeUp 0.6s ease-out 0.9s forwards;
        }
        #loading .progress-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #997733, #CCA855, #BBA060);
            border-radius: 3px;
            transition: width 1.5s ease;
            position: relative;
            box-shadow: 0 0 6px #CCA85540;
        }
        /* Animated shimmer across the fill */
        #loading .progress-fill::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(
                90deg,
                transparent 0%,
                #FFD70030 40%,
                #FFD70050 50%,
                #FFD70030 60%,
                transparent 100%
            );
            animation: shimmer 2s ease-in-out infinite;
        }
        @keyframes shimmer {
            0%   { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* Stage text */
        #loading .stage-text {
            font-family: 'Crimson Text', 'Georgia', serif;
            font-size: clamp(0.75rem, 2vw, 0.9rem);
            color: #D8CCAA;
            margin-top: 0.8rem;
            opacity: 0;
            animation: fadeUp 0.5s ease-out 1.1s forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Fade-out when Compose takes over */
        #loading.fade-out {
            animation: screenFade 0.5s ease-out forwards;
        }
        @keyframes screenFade {
            to { opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="cover-bg" id="cover-bg"></div>
        <div class="vignette"></div>
        <div class="embers">
            <div class="ember"></div>
            <div class="ember"></div>
            <div class="ember"></div>
            <div class="ember"></div>
            <div class="ember"></div>
            <div class="ember"></div>
        </div>
        <div class="content">
            <h1 id="world-title">NeoMud</h1>
            <div class="divider"></div>
            <div class="world-meta" id="world-meta"></div>
            <div class="progress-trough">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <p class="stage-text" id="stage-text">Loading game engine...</p>
        </div>
    </div>
    <div id="ComposeTarget" style="width: 100%; height: 100%;"></div>
    <script>
        // Read marketplace config from sessionStorage FIRST (before anything else)
        try {
            var stored = sessionStorage.getItem('__NEOMUD_CONFIG__');
            if (stored) {
                window.__NEOMUD_CONFIG__ = JSON.parse(stored);
                sessionStorage.removeItem('__NEOMUD_CONFIG__');
            }
        } catch(e) { /* ignore parse errors */ }

        // Apply world metadata to loading screen
        var cfg = window.__NEOMUD_CONFIG__;
        if (cfg) {
            if (cfg.worldName) {
                document.getElementById('world-title').textContent = cfg.worldName;
                document.title = cfg.worldName + ' \u2014 NeoMud';
            }
            var metaHtml = '';
            if (cfg.worldVersion) metaHtml += '<span class="version">v' + cfg.worldVersion + '</span>';
            if (cfg.worldVersion && cfg.creatorName) metaHtml += '<span class="dot">\u2022</span>';
            if (cfg.creatorName) metaHtml += '<span class="creator">by ' + cfg.creatorName + '</span>';
            if (metaHtml) document.getElementById('world-meta').innerHTML = metaHtml;
            if (cfg.coverImageUrl) {
                document.getElementById('cover-bg').style.backgroundImage = 'url(' + cfg.coverImageUrl + ')';
            }
            // Play loading BGM
            if (cfg.loadingBgmUrl) {
                var bgm = new Audio(cfg.loadingBgmUrl);
                bgm.loop = true;
                bgm.volume = 0.4;
                bgm.play().catch(function(){});
                window.__NEOMUD_LOADING_BGM__ = bgm;
            }
        }

        // Staged loading progress
        var fill = document.getElementById('progress-fill');
        var stageText = document.getElementById('stage-text');
        var stages = [
            { pct: 25, text: 'Loading game engine...' },
            { pct: 50, text: 'Compiling shaders...' },
            { pct: 75, text: 'Initializing world...' },
            { pct: 90, text: 'Almost ready...' }
        ];
        var stageIdx = 0;

        function advanceStage() {
            if (stageIdx < stages.length) {
                fill.style.width = stages[stageIdx].pct + '%';
                stageText.textContent = stages[stageIdx].text;
                stageIdx++;
            }
        }

        advanceStage();
        setTimeout(advanceStage, 2000);
        setTimeout(advanceStage, 5000);
        setTimeout(advanceStage, 9000);

        // Remove loading screen once Compose renders
        var observer = new MutationObserver(function() {
            var target = document.getElementById('ComposeTarget');
            if (target && target.childNodes.length > 0) {
                fill.style.width = '100%';
                stageText.textContent = 'Connected!';
                // Stop loading BGM (game will start its own)
                if (window.__NEOMUD_LOADING_BGM__) {
                    window.__NEOMUD_LOADING_BGM__.pause();
                    window.__NEOMUD_LOADING_BGM__ = null;
                }
                var loadingEl = document.getElementById('loading');
                if (loadingEl) {
                    loadingEl.classList.add('fade-out');
                    setTimeout(function() { loadingEl.remove(); observer.disconnect(); }, 500);
                }
            }
        });
        observer.observe(document.body, { childList: true, subtree: true, attributes: true });
        setTimeout(function() {
            var el = document.getElementById('loading');
            if (el) { el.classList.add('fade-out'); setTimeout(function() { el.remove(); }, 500); }
        }, 20000);
    </script>
    <!-- Sentry error tracking (CDN loader with baked-in DSN, catches all JS errors) -->
    <script src="https://js.sentry-cdn.com/ed49ac2687b7b9cc5c0cd45c2bf1e1f1.min.js" crossorigin="anonymous"></script>
    <script src="neomud-audio.js"></script>
    <script src="neomud.js"></script>
</body>
</html>
