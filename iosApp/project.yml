name: NeoMud
options:
  bundleIdPrefix: com.neomud
  deploymentTarget:
    iOS: "16.0"

settings:
  SWIFT_VERSION: "5.0"

targets:
  NeoMud:
    type: application
    platform: iOS
    sources:
      - NeoMud
    info:
      path: NeoMud/Info.plist
      properties:
        CFBundleIdentifier: com.neomud.NeoMud
        CFBundleExecutable: NeoMud
        CFBundleName: NeoMud
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        CFBundleDevelopmentRegion: $(DEVELOPMENT_LANGUAGE)
        CFBundleInfoDictionaryVersion: "6.0"
        UILaunchScreen: {}
        CADisableMinimumFrameDurationOnPhone: true
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: $(NEOMUD_ALLOW_ARBITRARY_LOADS)
        NeoMudDefaultHost: $(NEOMUD_DEFAULT_HOST)
        NeoMudDefaultPort: $(NEOMUD_DEFAULT_PORT)
        NeoMudUseTLS: $(NEOMUD_USE_TLS)
        NeoMudShowConfig: $(NEOMUD_SHOW_CONFIG)
    settings:
      configs:
        Debug:
          NEOMUD_ALLOW_ARBITRARY_LOADS: "true"
          NEOMUD_DEFAULT_HOST: "127.0.0.1"
          NEOMUD_DEFAULT_PORT: "8080"
          NEOMUD_USE_TLS: "false"
          NEOMUD_SHOW_CONFIG: "true"
        Release:
          NEOMUD_ALLOW_ARBITRARY_LOADS: "false"
          NEOMUD_DEFAULT_HOST: "play.neomud.com"
          NEOMUD_DEFAULT_PORT: "443"
          NEOMUD_USE_TLS: "true"
          NEOMUD_SHOW_CONFIG: "false"
      FRAMEWORK_SEARCH_PATHS:
        - "$(inherited)"
        - "$(SRCROOT)/../client/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)"
      LD_RUNPATH_SEARCH_PATHS:
        - "$(inherited)"
        - "@executable_path/Frameworks"
      OTHER_LDFLAGS:
        - "$(inherited)"
        - "-framework"
        - "NeoMudClient"
    dependencies:
      - framework: ../client/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)/NeoMudClient.framework
        embed: false
    preBuildScripts:
      - name: "Build Kotlin Framework"
        script: |
          cd "$SRCROOT/.."
          ./gradlew :client:embedAndSignAppleFrameworkForXcode
        basedOnDependencyAnalysis: false
