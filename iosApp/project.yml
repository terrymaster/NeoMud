name: NeoMud
options:
  bundleIdPrefix: com.neomud
  deploymentTarget:
    iOS: "16.0"

settings:
  SWIFT_VERSION: "5.0"

targets:
  NeoMud:
    type: application
    platform: iOS
    sources:
      - NeoMud
    info:
      path: NeoMud/Info.plist
      properties:
        CFBundleIdentifier: com.neomud.NeoMud
        CFBundleExecutable: NeoMud
        CFBundleName: NeoMud
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        CADisableMinimumFrameDurationOnPhone: true
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    settings:
      FRAMEWORK_SEARCH_PATHS:
        - "$(SRCROOT)/../client/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)"
      OTHER_LDFLAGS:
        - "-framework"
        - "NeoMudClient"
    dependencies:
      - framework: ../client/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)/NeoMudClient.framework
        embed: false
    preBuildScripts:
      - name: "Build Kotlin Framework"
        script: |
          cd "$SRCROOT/.."
          ./gradlew :client:embedAndSignAppleFrameworkForXcode
        basedOnDependencyAnalysis: false
